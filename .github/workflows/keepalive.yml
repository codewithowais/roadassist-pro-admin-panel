name: Supabase keep-alive

# Prevents the free-tier Supabase project from auto-pausing after ~7 days of
# inactivity (which is what caused the "Failed to fetch" / login outage).
# A small daily REST request keeps the project marked as active.
#
# SETUP (one-time): add two repository secrets under
#   GitHub repo → Settings → Secrets and variables → Actions:
#     SUPABASE_URL       e.g. https://<project-ref>.supabase.co
#     SUPABASE_ANON_KEY  the publishable / anon key
#
# Note: GitHub disables scheduled workflows after 60 days with no repo commits.
# A commit (or the manual "Run workflow" button) re-enables it.

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" \
            "$URL/rest/v1/app_config?select=key&limit=1")
          echo "Supabase responded with HTTP $code"
          # Any HTTP response (200/401/403/404) proves the project is awake and
          # counts as activity. 000 means it was unreachable.
          if [ "$code" = "000" ]; then
            echo "::error::Supabase project is unreachable."
            exit 1
          fi
